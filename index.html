<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario - Librería de utileria.js</title>
    <link rel="stylesheet" href="css/index.css">
    <script src="js/utileria.js"></script>
    <script src="js/index.js"></script>
</head>

<body>
    <div class="contenedor">
        <div class="formulario">
            <h1>Sistema de Registro</h1>
            <h2>Formulario de Registro</h2>
            <p>Complete la siguiente información.</p>
            <form id="registro">
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" placeholder="Ej: Melody" required>

                <label for="apPaterno">Apellido paterno:</label>
                <input type="text" id="apPaterno" placeholder="Ej: Mendoza" required>

                <label for="apMaterno">Apellido materno:</label>
                <input type="text" id="apMaterno" placeholder="Ej: Jimenez" required>

                <label for="correo">Correo electrónico:</label>
                <input type="email" id="correo" placeholder="ejemplo@correo.com" required>

                <label for="telefono">Teléfono:</label>
                <input type="number" id="telefono" placeholder="10 dígitos" required>

                <label for="fecha">Fecha de nacimiento:</label>
                <input type="date" id="fecha" required>

                <label for="contra">Contraseña:</label>
                <input type="password" id="contra" placeholder="Ingresa una contraseña" required>

                <label for="confirmar">Confirmar contraseña:</label>
                <input type="password" id="confirmar" placeholder="Confirma tu contraseña" required>

                <button type="button" onclick="guardar()">Validar Datos</button>
                <button type="reset">Limpiar</button>
                <p class="enlace">
                    <a href="login.html">Ir al Login</a>
                </p>
            </form>
        </div>
    </div>
    <div id="modal" style="display: none;">
        <div class="contenidoModal">
            <div class="iconoModal"></div>
            <h2>Registro completado</h2>
            <p>La información fue validada correctamente.</p>
            <p id="nombreCompleto"></p>
            <p id="edad"></p>
            <p id="mayor"></p>
            <button type="button" onclick="cerrarModal()">
                Cerrar
            </button>
        </div>
    </div>
</body>

</html>
