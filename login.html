<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Librería de utileria.js</title>
    <link rel="stylesheet" href="css/login.css">
    <script src="js/utileria.js"></script>
    <script src="js/login.js"></script>
</head>

<body>
    <div class="contenedor">
        <div class="login">
            <h1>Sistema de Registro</h1>
            <h2>Iniciar Sesión</h2>
            <p>Ingrese su correo y contraseña.</p>
            <form id="login">
                <label for="correo">Correo electrónico:</label>
                <input type="email" id="correo" placeholder="ejemplo@correo.com" required>
                <label for="contra">Contraseña:</label>
                <input type="password" id="contra" placeholder="Ingresa tu contraseña" required>
                <button type="button" id="entrar" onclick="iniciarSesion()">
                    Iniciar Sesión
                </button>
                <p class="enlace">
                    <a href="index.html">Regresar al formulario</a>
                </p>
            </form>
            <div id="mensaje"></div>
        </div>
    </div>
</body>

</html>
